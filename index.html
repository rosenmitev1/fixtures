// ── DB STATUS ──
function updateStatus(){
  const hc=Object.keys(bttsDB.home).length, ac=Object.keys(bttsDB.away).length;
  console.log('BTTS DB: '+hc+' home, '+ac+' away teams');
}

// ── NORMALIZE TEAM NAME ──
function norm(name){
  return name.toLowerCase()
    .replace(/\b(fc|afc|ac|ssc|us|as|sc|vfl|vfb|fsv|rb|rcd|ca|cd|rc|og|tsv|sv|fk|bsc|bv|if|1\.|cf)\b/g,'')
    .replace(/[^a-z0-9]/g,'');
}

// ── LOOKUP ──
function lookupBTTS(teamName,side){
  const db=bttsDB[side];
  if(!db||Object.keys(db).length===0)return null;
  const nk=norm(teamName);
  if(db[nk])return db[nk];
  // Fuzzy
  for(const[key,val]of Object.entries(db)){
    if(nk.length>3&&key.length>3&&(nk.includes(key)||key.includes(nk)))return val;
  }
  // Word match
  const words=teamName.toLowerCase().split(/[\s\-]+/).filter(w=>w.length>3);
  for(const w of words){
    const nw=norm(w);
    if(nw.length<4)continue;
    for(const[key,val]of Object.entries(db)){
      if(key.includes(nw))return val;
    }
  }
  return null;
}

// ── DATE ──
function ds(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function fmtD(s){return new Date(s+'T12:00:00').toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}
function fmtT(iso){return new Date(iso).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'Europe/Sofia'})}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

function init(){
  document.getElementById('dp').value=ds(new Date());
  bq();
  updateStatus();
  // Auto-scan today's fixtures on page load
  setTimeout(()=>doScan(),300);
}
function bq(){const w=document.getElementById('qd'),n=new Date(),s=document.getElementById('dp').value;const dd=[{l:'Yesterday',o:-1},{l:'Today',o:0},{l:'Tomorrow',o:1}];w.innerHTML=dd.map(d=>{const dt=new Date(n);dt.setDate(dt.getDate()+d.o);const v=ds(dt);return`<button class="qb${v===s?' on':''}" onclick="pq('${v}')">${d.l}</button>`}).join('')}
function pq(v){document.getElementById('dp').value=v;doScan()}

// ── SCAN ──
async function doScan(){
  const btn=document.getElementById('btn'),ct=document.getElementById('ct'),sel=document.getElementById('dp').value;
  btn.classList.add('ld');btn.innerHTML='&#9906; SCANNING...';
  ct.innerHTML=`<div class="ldw"><div class="ldsp"></div><div class="ldt">Fetching fixtures...</div><div class="lds">${fmtD(sel)}</div></div>`;
  document.getElementById('sts').classList.add('hidden');document.getElementById('flt').classList.add('hidden');
  try{
    const r=await fetch(BASE+`/fixtures?date=${sel}`,{headers:{'x-apisports-key':AK}});
    if(!r.ok)throw new Error(`HTTP ${r.status}`);
    const d=await r.json();
    if(d.errors&&Object.keys(d.errors).length)throw new Error(Object.values(d.errors).join(', '));
    allFix=(d.response||[]).filter(f=>WI.has(f.league.id));
    renderFix(sel);
  }catch(err){
    ct.innerHTML=`<div class="err"><h3>&#9888; ${esc(err.message)}</h3><p>Download & open in browser.</p></div>`;
  }finally{btn.classList.remove('ld');btn.innerHTML='&#9906; SCAN';bq()}
}

// ── RENDER ──
function renderFix(sel){
  const ct=document.getElementById('ct'),grouped={};
  allFix.forEach(f=>{const lid=f.league.id;if(!grouped[lid])grouped[lid]={league:f.league,fixes:[]};grouped[lid].fixes.push(f)});
  Object.values(grouped).forEach(g=>g.fixes.sort((a,b)=>new Date(a.fixture.date)-new Date(b.fixture.date)));
  const sortedKeys=Object.keys(grouped).sort((a,b)=>(WL[a]?.t??99)-(WL[b]?.t??99));
  const total=allFix.length,lc=sortedKeys.length;
  const live=allFix.filter(f=>isLive(f.fixture.status.short)).length,sched=allFix.filter(f=>f.fixture.status.short==='NS').length,fin=allFix.filter(f=>isFin(f.fixture.status.short)).length;
  const sb=document.getElementById('sts');sb.classList.remove('hidden');
  sb.innerHTML=`<div class="st"><div class="stv" style="color:var(--grn)">${total}</div><div class="stl">Fixtures</div></div><div class="st"><div class="stv" style="color:var(--org)">${lc}</div><div class="stl">Leagues</div></div><div class="st"><div class="stv" style="color:var(--red)">${live}</div><div class="stl">Live</div></div><div class="st"><div class="stv" style="color:var(--cyn)">${sched}</div><div class="stl">Upcoming</div></div><div class="st"><div class="stv" style="color:var(--t3)">${fin}</div><div class="stl">Finished</div></div>`;
  const fb=document.getElementById('flt');
  if(total){fb.classList.remove('hidden');let fh=`<button class="fb on" onclick="doF('all',this)">All <span class="n">${total}</span></button>`;sortedKeys.forEach(lid=>{const g=grouped[lid];fh+=`<button class="fb" onclick="doF('${lid}',this)">${g.league.flag?`<img src="${g.league.flag}">`:''}${esc(g.league.name)} <span class="n">${g.fixes.length}</span></button>`});fb.innerHTML=fh}else fb.classList.add('hidden');
  if(!total){ct.innerHTML=`<div class="empty"><div class="empi">&#9917;</div><div class="empt">No fixtures for ${fmtD(sel)}</div></div>`;return}
  let html='';
  sortedKeys.forEach(lid=>{const g=grouped[lid],lg=g.league;html+=`<div class="lsec" data-lid="${lid}"><div class="lh">${lg.logo?`<img src="${lg.logo}">`:''}${lg.flag?`<img class="lhf" src="${lg.flag}">`:''}<div><div class="ln">${esc(lg.name)}</div><div class="lc">${esc(lg.country||'')}</div></div><span class="lct">${g.fixes.length}</span><div class="ll"></div></div>`;g.fixes.forEach(f=>{html+=renderMatch(f)});html+=`</div>`});
  ct.innerHTML=html;
}

function renderMatch(f){
  const h=f.teams.home,a=f.teams.away,st=f.fixture.status,g=f.goals;
  let center='';
  if(st.short==='NS'||st.short==='TBD')center=`<div class="mct sns">${fmtT(f.fixture.date)}</div><div class="mcst sns">${st.short==='TBD'?'TBD':'Kickoff'}</div>`;
  else if(isLive(st.short))center=`<div class="mcs slvs">${g.home??0} – ${g.away??0}</div><div class="mcst slv">${st.elapsed||''}' ${st.short}</div>`;
  else if(isFin(st.short))center=`<div class="mcs">${g.home??0} – ${g.away??0}</div><div class="mcst sft">${stLbl(st.short)} · ${fmtT(f.fixture.date)}</div>`;
  else center=`<div class="mct sps">${stLbl(st.short)}</div><div class="mcst sps">${fmtT(f.fixture.date)}</div>`;

  // Lookup BTTS for both teams
  const hB=lookupBTTS(fixName(h.name),'home'), aB=lookupBTTS(fixName(a.name),'away');
  const combined=(hB&&aB)?Math.round((hB.btts+aB.btts)/2):null;

  // Home BTTS chip
  let hBttsHtml=hB?`<div class="tm-btts">🏠 BTTS ${hB.btts}% <span class="tm-btts-gm">(${hB.mp}gm)</span></div>`:'';
  // Away BTTS chip
  let aBttsHtml=aB?`<div class="tm-btts">✈️ BTTS ${aB.btts}% <span class="tm-btts-gm">(${aB.mp}gm)</span></div>`:'';

  // Combined BTTS bar
  let combHtml='';
  if(combined!==null){
    let cls='btts-m',lbl=`BTTS ${combined}%`;
    if(combined>=55){cls='btts-y';lbl=`BTTS YES ${combined}%`}
    else if(combined<=40){cls='btts-n';lbl=`BTTS NO ${100-combined}%`}
    let resultChip='';
    if(isFin(st.short)&&g.home!==null&&g.away!==null){
      const bttsHit=g.home>0&&g.away>0;
      resultChip=bttsHit?`<span class="chip btts-hit">✓ HIT</span>`:`<span class="chip btts-miss">✗ MISS</span>`;
    }
    combHtml=`<div class="pred"><span class="chip ${cls} btts-hi">${lbl}</span>${resultChip}</div>`;
  }else{
    combHtml=`<div class="pred"><span class="pna">Teams not found in BTTS DB</span></div>`;
  }

  return`<div class="mx"><div class="mx-top">
    <div class="tm">${h.logo?`<img src="${h.logo}">`:''}
      <div class="tm-info"><div class="tn">${fixName(h.name)}</div>${hBttsHtml}</div></div>
    <div class="mc">${center}</div>
    <div class="tm aw">${a.logo?`<img src="${a.logo}">`:''}
      <div class="tm-info"><div class="tn">${fixName(a.name)}</div>${aBttsHtml}</div></div>
  </div>${combHtml}</div>`;
}

function fixName(n){
  const fixes={'Eyupspor':'Eyüpspor','Genclerbirligi':'Gençlerbirliği','Karagumruk':'Karagümrük',
    'Basaksehir':'Başakşehir','Trabzonspor':'Trabzonspor','Gaziantep':'Gaziantep',
    'Umraniyespor':'Ümraniyespor','Kayserispor':'Kayserispor','Istanbulspor':'İstanbulspor',
    'Kasimpasa':'Kasımpaşa','Caykur Rizespor':'Çaykur Rizespor','Rizespor':'Çaykur Rizespor',
    'Fenerbahce':'Fenerbahçe','Besiktas':'Beşiktaş','Galatasaray':'Galatasaray',
    'Konyaspor':'Konyaspor','Sivasspor':'Sivasspor','Alanyaspor':'Alanyaspor',
    'Ankaragucu':'Ankaragücü','MKE Ankaragucu':'MKE Ankaragücü',
    'Giresunspor':'Giresunspor','Adana Demirspor':'Adana Demirspor',
    'Hatayspor':'Hatayspor','Pendikspor':'Pendikspor',
    'Borussia Monchengladbach':"Borussia M'gladbach",
    'Brondby':'Brøndby','Midtjylland':'FC Midtjylland',
    'Nordsjaelland':'Nordsjælland','Silkeborg':'Silkeborg IF',
    'Bodo/Glimt':'Bodø/Glimt','Valerenga':'Vålerenga',
    'Lillestrom':'Lillestrøm','Stromsgodset':'Strømsgodset',
    'Tromso':'Tromsø','Haugesund':'FK Haugesund',
    'Zurich':'FC Zürich','Luzern':'FC Luzern'};
  for(const[k,v]of Object.entries(fixes)){
    if(n.toLowerCase().includes(k.toLowerCase()))return v;
  }
  return n;
}

function isLive(s){return['1H','2H','HT','ET','BT','P','LIVE'].includes(s)}
function isFin(s){return['FT','AET','PEN'].includes(s)}
function stLbl(s){return{FT:'Full Time',AET:'Extra Time',PEN:'Penalties',PST:'Postponed',CANC:'Cancelled',ABD:'Abandoned',SUSP:'Suspended',HT:'Half Time','1H':'1st Half','2H':'2nd Half',NS:'Not Started'}[s]||s}
function doF(lid,el){document.querySelectorAll('.fb').forEach(b=>b.classList.remove('on'));if(el)el.classList.add('on');document.querySelectorAll('.lsec').forEach(s=>{s.classList.toggle('hidden',lid!=='all'&&s.dataset.lid!==lid)})}
document.getElementById('dp').addEventListener('change',()=>doScan());
// iOS-friendly: add touchend listener to scan button as backup
document.getElementById('btn').addEventListener('touchend',(e)=>{e.preventDefault();doScan()});
init();
</script>
