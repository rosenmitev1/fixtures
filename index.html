<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fixture Scanner + Footiqo BTTS</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#04070c;--s1:#0a0f19;--s2:#101724;--b1:#1a2238;--b2:#253050;--tx:#e2e6f0;--t2:#7d8aaa;--t3:#3e4b6b;--grn:#00e88a;--grn2:#00c878;--gd:rgba(0,232,138,.07);--red:#ff3a5c;--rd:rgba(255,58,92,.08);--org:#ff8a35;--ylw:#ffc842;--yd:rgba(255,200,66,.08);--cyn:#35d4ff;--r:10px;--r2:14px}
*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--tx);font-family:'Outfit',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px}
.app{max-width:1020px;margin:0 auto;padding:24px 16px 120px}
.hdr{display:flex;align-items:flex-end;gap:14px;margin-bottom:20px;flex-wrap:wrap}.hdr-l{flex:1;min-width:200px}
.logo{font-family:'Bebas Neue',cursive;font-size:clamp(26px,5vw,44px);line-height:.9;letter-spacing:2px;background:linear-gradient(135deg,var(--grn),var(--cyn));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-s{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--t3);letter-spacing:2px;text-transform:uppercase;margin-top:3px}
.badge{font-family:'IBM Plex Mono',monospace;font-size:8px;background:var(--gd);border:1px solid rgba(0,232,138,.2);color:var(--grn);padding:3px 9px;border-radius:100px;letter-spacing:1px}
.ctrl{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.di{background:var(--s2);border:1px solid var(--b1);color:var(--tx);font-family:'IBM Plex Mono',monospace;font-size:13px;padding:10px 14px;border-radius:var(--r);outline:none;flex:1;min-width:160px;cursor:pointer}.di:focus{border-color:var(--grn)}
.sb{background:linear-gradient(135deg,var(--grn),var(--grn2));border:none;color:#050a10;font-family:'Outfit',sans-serif;font-size:13px;font-weight:800;padding:10px 26px;border-radius:var(--r);cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:7px;text-transform:uppercase;letter-spacing:1.5px;white-space:nowrap;box-shadow:0 0 16px rgba(0,232,138,.12);-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.sb:hover{transform:translateY(-1px);box-shadow:0 4px 24px rgba(0,232,138,.25)}.sb.ld{opacity:.6;pointer-events:none}
.qd{display:flex;gap:5px;margin-bottom:16px;flex-wrap:wrap}
.qb{background:var(--s1);border:1px solid var(--b1);color:var(--t2);font-size:10px;font-weight:700;padding:4px 12px;border-radius:100px;cursor:pointer;transition:all .15s}
.qb:hover{border-color:var(--t2);color:var(--tx)}.qb.on{background:var(--gd);border-color:var(--grn);color:var(--grn)}

.step2 textarea{width:100%;background:var(--s2);border:1px solid var(--b1);color:var(--tx);font-family:'IBM Plex Mono',monospace;font-size:9px;padding:8px;border-radius:var(--r);min-height:60px;resize:vertical;margin-top:6px}
.db-status{font-family:'IBM Plex Mono',monospace;font-size:10px;padding:8px 12px;border-radius:var(--r);margin:8px 0;display:flex;align-items:center;gap:6px}
.db-ok{background:var(--gd);color:var(--grn);border:1px solid rgba(0,232,138,.15)}
.db-empty{background:var(--rd);color:var(--red);border:1px solid rgba(255,58,92,.12)}
/* STATS, FILTERS, MATCHES — same as before */
.sts{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:5px;margin-bottom:16px}
.st{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:10px;text-align:center}
.stv{font-family:'Bebas Neue',cursive;font-size:24px;line-height:1}.stl{font-family:'IBM Plex Mono',monospace;font-size:7px;color:var(--t3);text-transform:uppercase;letter-spacing:1.5px;margin-top:2px}
.flt{display:flex;gap:4px;margin-bottom:14px;flex-wrap:wrap;max-height:90px;overflow-y:auto}
.fb{background:var(--s1);border:1px solid var(--b1);color:var(--t2);font-size:10px;font-weight:600;padding:4px 10px;border-radius:100px;cursor:pointer;transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:3px}
.fb:hover{border-color:var(--t2);color:var(--tx)}.fb.on{background:var(--gd);border-color:var(--grn);color:var(--grn)}
.fb img{width:14px;height:10px;object-fit:contain;border-radius:1px}.fb .n{font-family:'IBM Plex Mono',monospace;font-size:9px;opacity:.5}
.lsec{margin-bottom:18px}.lh{display:flex;align-items:center;gap:8px;margin-bottom:6px;padding:0 2px}
.lh img{width:20px;height:20px;object-fit:contain}.lhf{width:18px;height:12px;object-fit:cover;border-radius:2px;opacity:.7}
.ln{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--t2)}
.lc{font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--t3);letter-spacing:1px}.ll{flex:1;height:1px;background:var(--b1)}.lct{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--t3)}
.mx{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r2);margin-bottom:5px;overflow:hidden;transition:all .15s}
.mx:hover{border-color:var(--b2);background:var(--s2)}
.mx-top{display:grid;grid-template-columns:1fr auto 1fr;align-items:start;gap:10px;padding:12px 16px}
.tm{display:flex;align-items:center;gap:8px}
.tm.aw{flex-direction:row-reverse;text-align:right;justify-self:end}
.tm img{width:28px;height:28px;object-fit:contain;flex-shrink:0}
.tm-info{display:flex;flex-direction:column;gap:2px}
.tn{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;line-height:1.2}
.tm-btts{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;color:var(--ylw);white-space:nowrap;line-height:1.2}
.tm-btts-gm{font-size:9px;font-weight:500;color:var(--t3)}
.mc{text-align:center;min-width:80px;align-self:center}
.mct{font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:700;letter-spacing:1px}
.mcs{font-family:'Bebas Neue',cursive;font-size:24px;letter-spacing:3px}
.mcst{font-family:'IBM Plex Mono',monospace;font-size:8px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;margin-top:2px}
.sns{color:var(--grn)}.slv{color:var(--red);animation:bl 1s infinite}.sft{color:var(--t3)}.sps{color:var(--org)}.slvs{color:var(--red)}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.4}}
.pred{display:flex;gap:6px;padding:8px 16px 10px;flex-wrap:wrap;align-items:center;border-top:1px solid rgba(26,34,56,.5);background:rgba(0,0,0,.1)}
.chip{display:inline-flex;align-items:center;gap:3px;font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:600;padding:3px 8px;border-radius:6px;letter-spacing:.3px;white-space:nowrap}
.cd{background:rgba(62,75,107,.1);color:var(--t2);border:1px solid rgba(62,75,107,.15)}
.btts-hi{font-size:10px;font-weight:700;padding:4px 12px}
.btts-y{background:rgba(0,232,138,.14);color:#00ffa3;border:1px solid rgba(0,232,138,.3)}
.btts-n{background:rgba(255,58,92,.1);color:#ff6b82;border:1px solid rgba(255,58,92,.2)}
.btts-m{background:rgba(255,200,66,.1);color:var(--ylw);border:1px solid rgba(255,200,66,.2)}
.btts-hit{background:rgba(0,232,138,.2);color:#00ffa3;border:1px solid rgba(0,232,138,.4);font-weight:700;font-size:9px;padding:3px 8px}
.btts-miss{background:rgba(255,58,92,.15);color:#ff6b82;border:1px solid rgba(255,58,92,.3);font-weight:700;font-size:9px;padding:3px 8px}
.pna{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--t3)}
.empty{text-align:center;padding:40px 20px}.empi{font-size:36px;margin-bottom:8px;opacity:.15}.empt{color:var(--t3);font-size:12px}
.ldw{text-align:center;padding:50px 20px}
.ldsp{width:36px;height:36px;border:3px solid var(--b1);border-top-color:var(--grn);border-radius:50%;animation:sp .6s linear infinite;margin:0 auto 14px}
@keyframes sp{to{transform:rotate(360deg)}}
.ldt{color:var(--t2);font-size:12px}.lds{color:var(--t3);font-size:10px;margin-top:3px}
.err{background:var(--rd);border:1px solid rgba(255,58,92,.2);border-radius:var(--r2);padding:16px;text-align:center;margin:14px 0}
.err h3{color:var(--red);font-size:13px;margin-bottom:4px}.err p{color:var(--t2);font-size:11px}
.hidden{display:none!important}
@media(max-width:640px){.app{padding:14px 10px 80px}.mx-top{padding:8px 10px;gap:6px}.tn{font-size:11px;max-width:110px}.tm img{width:22px;height:22px}.tm-btts{font-size:10px}.mcs{font-size:20px}.mct{font-size:13px}.mc{min-width:66px}.pred{padding:6px 10px 8px;gap:4px}.chip{font-size:8px;padding:2px 6px}.sts{grid-template-columns:repeat(3,1fr)}.sb{padding:12px 20px;font-size:14px;-webkit-tap-highlight-color:transparent;touch-action:manipulation}.qb{padding:8px 16px;font-size:11px;-webkit-tap-highlight-color:transparent;touch-action:manipulation}.di{padding:12px 14px;font-size:14px}}
</style>
</head>
<body>
<div class="app">
  <div class="hdr"><div class="hdr-l"><div class="logo">FIXTURE SCANNER</div><div class="logo-s">API-Football Fixtures &bull; Footiqo BTTS Data</div></div><div class="badge">FOOTIQO BTTS</div></div>
  <div class="ctrl"><input type="date" class="di" id="dp"><button class="sb" id="btn" onclick="doScan()">&#9906; SCAN</button></div>
  <div class="qd" id="qd"></div>
  <div class="db-status db-ok" style="margin-bottom:12px">⟳ Loading BTTS data...</div>

  <div id="sts" class="sts hidden"></div>
  <div id="flt" class="flt hidden"></div>
  <div id="ct"></div>
</div>

<script>
const AK='7944c5c7525616e53854f4b2e6be1396',BASE='https://v3.football.api-sports.io';
const WL={2:{n:"Champions League",c:"Europe",t:0},3:{n:"Europa League",c:"Europe",t:0},848:{n:"Conference League",c:"Europe",t:0},39:{n:"Premier League",c:"England",t:1},40:{n:"Championship",c:"England",t:2},41:{n:"League One",c:"England",t:3},42:{n:"League Two",c:"England",t:3},61:{n:"Ligue 1",c:"France",t:1},78:{n:"Bundesliga",c:"Germany",t:1},79:{n:"2. Bundesliga",c:"Germany",t:2},80:{n:"3. Liga",c:"Germany",t:3},88:{n:"Eredivisie",c:"Netherlands",t:1},94:{n:"Primeira Liga",c:"Portugal",t:1},103:{n:"Eliteserien",c:"Norway",t:1},120:{n:"Superligaen",c:"Denmark",t:1},135:{n:"Serie A",c:"Italy",t:1},140:{n:"La Liga",c:"Spain",t:1},144:{n:"Jupiler Pro",c:"Belgium",t:1},179:{n:"Premiership",c:"Scotland",t:1},203:{n:"Süper Lig",c:"Turkey",t:1},207:{n:"Super League",c:"Switzerland",t:1},208:{n:"Challenge Lg",c:"Switzerland",t:2},218:{n:"Bundesliga",c:"Austria",t:1}};
const WI=new Set(Object.keys(WL).map(Number));
let allFix=[];

// ═══ FOOTIQO BTTS DATA — loaded from external CSV files ═══
// Keyed by normalized "team|league" for league-aware matching
const bttsDB = {home:{}, away:{}};
let bttsReady = false;

// Map API-Football league names → Footiqo CSV league names
const LEAGUE_MAP = {
  'Champions League':'Champions League','UEFA Champions League':'Champions League',
  'Europa League':'Europa League','UEFA Europa League':'Europa League',
  'Conference League':'Conference League','UEFA Europa Conference League':'Conference League',
  'Premier League':'Premier League',
  'Championship':'Championship',
  'League One':'League One','EFL League One':'League One',
  'League Two':'League Two','EFL League Two':'League Two',
  'Ligue 1':'Ligue 1','Ligue 1 Uber Eats':'Ligue 1',
  'Bundesliga':'Bundesliga',
  '2. Bundesliga':'2. Bundesliga',
  '3. Liga':'3. Liga',
  'Eredivisie':'Eredivisie',
  'Primeira Liga':'Liga Portugal','Liga Portugal':'Liga Portugal','Primeira Liga Betclic':'Liga Portugal',
  'Eliteserien':'Eliteserien',
  'Superligaen':'Superliga','Danish Superliga':'Superliga','Superliga':'Superliga',
  'Serie A':'Serie A',
  'La Liga':'LaLiga','LaLiga':'LaLiga',
  'Jupiler Pro League':'Jupiler Pro League','Jupiler Pro':'Jupiler Pro League',
  'Premiership':'Premiership','Scottish Premiership':'Premiership',
  'Süper Lig':'Super Lig','Super Lig':'Super Lig','Turkish Süper Lig':'Super Lig',
  'Super League':'Super League','Swiss Super League':'Super League',
  'Challenge League':'Challenge League','Swiss Challenge League':'Challenge League',
  'Bundesliga (Austria)':'Bundesliga',
};

// Get base URL of current page
const BASE_URL = window.location.href.substring(0, window.location.href.lastIndexOf('/') + 1);

// ── Strip accents/diacritics for matching ──
function stripAccents(s) {
  return s.normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/ø/g,'o').replace(/Ø/g,'O')
    .replace(/ı/g,'i').replace(/İ/g,'I')
    .replace(/ş/g,'s').replace(/Ş/g,'S')
    .replace(/ğ/g,'g').replace(/Ğ/g,'G')
    .replace(/ü/g,'u').replace(/Ü/g,'U')
    .replace(/ö/g,'o').replace(/Ö/g,'O')
    .replace(/ç/g,'c').replace(/Ç/g,'C')
    .replace(/å/g,'a').replace(/Å/g,'A')
    .replace(/æ/g,'ae').replace(/Æ/g,'AE');
}

// ── Normalize for lookup key: strip accents, lowercase, remove noise ──
function norm(name) {
  let s = stripAccents(name).toLowerCase();
  // Remove common prefixes/suffixes but keep the core name
  s = s.replace(/[^a-z0-9\s]/g, ' ').replace(/\s+/g, ' ').trim();
  return s;
}

// ── Build a composite key: "normalised_team|normalised_league" ──
function makeKey(team, league) {
  return norm(team) + '|' + norm(league);
}

async function loadBTTSData() {
  const statusEl = document.querySelector('.db-status');
  if (statusEl) statusEl.innerHTML = '⟳ Loading BTTS data from CSV files...';

  async function loadCSV(filename, target) {
    const urls = [BASE_URL + filename, './' + filename, filename];
    for (const url of urls) {
      try {
        const resp = await fetch(url);
        if (!resp.ok) continue;
        const text = await resp.text();
        if (text.trim().startsWith('<!') || text.trim().startsWith('<html')) continue;
        const lines = text.trim().split('\n');
        let count = 0;
        for (let i = 1; i < lines.length; i++) {
          const cols = parseCSVLine(lines[i]);
          if (cols.length < 6) continue;
          const league = cols[2], team = cols[3];
          const mp = parseInt(cols[4]) || 0, btts = parseInt(cols[5]) || 0;
          if (!team || mp < 1) continue;
          // Store with league-specific key
          const key = makeKey(team, league);
          target[key] = {team, league, mp, btts};
          count++;
        }
        if (count > 0) return count;
      } catch(e) { /* try next URL */ }
    }
    return 0;
  }

  function parseCSVLine(line) {
    const result = [];
    let current = '', inQuotes = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { inQuotes = !inQuotes; }
      else if (ch === ',' && !inQuotes) { result.push(current.trim()); current = ''; }
      else { current += ch; }
    }
    result.push(current.trim());
    return result;
  }

  const hc = await loadCSV('team_BTTS_FT_Home.csv', bttsDB.home);
  const ac = await loadCSV('team_BTTS_FT_Away.csv', bttsDB.away);
  bttsReady = true;

  if (statusEl) {
    if (hc > 0 || ac > 0) {
      statusEl.className = 'db-status db-ok';
      statusEl.innerHTML = '✓ Footiqo BTTS loaded: <b>' + hc + '</b> home, <b>' + ac + '</b> away entries';
    } else {
      statusEl.className = 'db-status db-empty';
      statusEl.innerHTML = '✗ CSV files not found. Base URL: ' + BASE_URL;
    }
  }
  console.log('BTTS DB loaded: ' + hc + ' home, ' + ac + ' away');
}

// ── LEAGUE-AWARE LOOKUP ──
// apiLeagueName = league name from API-Football fixture
// teamName = team name from API-Football fixture
// side = 'home' or 'away'
function lookupBTTS(teamName, apiLeagueName, side) {
  const db = bttsDB[side];
  if (!db || Object.keys(db).length === 0) return null;

  const normTeam = norm(teamName);

  // 1) Map API league name to Footiqo CSV league name
  const csvLeague = LEAGUE_MAP[apiLeagueName] || apiLeagueName;
  const normLeague = norm(csvLeague);

  // 2) Try exact key match: "team|league"
  const exactKey = normTeam + '|' + normLeague;
  if (db[exactKey]) return db[exactKey];

  // 3) Try all entries for this league, find best team match
  const leagueEntries = Object.entries(db).filter(([k]) => k.endsWith('|' + normLeague));

  // 3a) Exact team name match within league
  for (const [k, v] of leagueEntries) {
    const dbTeam = k.split('|')[0];
    if (dbTeam === normTeam) return v;
  }

  // 3b) Full name containment (but BOTH directions must be > 4 chars to avoid "Inter" matching "Inter Miami")
  for (const [k, v] of leagueEntries) {
    const dbTeam = k.split('|')[0];
    // Only match if the shorter name is > 5 chars (avoids "inter" matching everything)
    const shorter = dbTeam.length < normTeam.length ? dbTeam : normTeam;
    const longer = dbTeam.length < normTeam.length ? normTeam : dbTeam;
    if (shorter.length > 5 && longer.includes(shorter)) return v;
  }

  // 3c) Word-based match: find entry where all significant words of one are in the other
  for (const [k, v] of leagueEntries) {
    const dbTeam = k.split('|')[0];
    const dbWords = dbTeam.split(' ').filter(w => w.length > 3);
    const teamWords = normTeam.split(' ').filter(w => w.length > 3);
    if (dbWords.length > 0 && teamWords.length > 0) {
      // Check if any significant word from the fixture team matches a DB word
      for (const tw of teamWords) {
        for (const dw of dbWords) {
          if (tw.length > 4 && dw.length > 4 && (tw.includes(dw) || dw.includes(tw))) return v;
        }
      }
    }
  }

  // 4) If no league-specific match found, DON'T fall back to other leagues
  //    This prevents "Arsenal Champions League" from getting "Arsenal Premier League" stats
  return null;
}

// ── DATE ──
function ds(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function fmtD(s){return new Date(s+'T12:00:00').toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}
function fmtT(iso){return new Date(iso).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'Europe/Sofia'})}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

async function init(){
  document.getElementById('dp').value=ds(new Date());
  bq();
  await loadBTTSData();
  // Auto-scan today's fixtures on page load
  setTimeout(()=>doScan(),300);
}
function bq(){const w=document.getElementById('qd'),n=new Date(),s=document.getElementById('dp').value;const dd=[{l:'Yesterday',o:-1},{l:'Today',o:0},{l:'Tomorrow',o:1}];w.innerHTML=dd.map(d=>{const dt=new Date(n);dt.setDate(dt.getDate()+d.o);const v=ds(dt);return`<button class="qb${v===s?' on':''}" onclick="pq('${v}')">${d.l}</button>`}).join('')}
function pq(v){document.getElementById('dp').value=v;doScan()}

// ── SCAN ──
async function doScan(){
  const btn=document.getElementById('btn'),ct=document.getElementById('ct'),sel=document.getElementById('dp').value;
  btn.classList.add('ld');btn.innerHTML='&#9906; SCANNING...';
  ct.innerHTML=`<div class="ldw"><div class="ldsp"></div><div class="ldt">Fetching fixtures...</div><div class="lds">${fmtD(sel)}</div></div>`;
  document.getElementById('sts').classList.add('hidden');document.getElementById('flt').classList.add('hidden');
  try{
    const r=await fetch(BASE+`/fixtures?date=${sel}`,{headers:{'x-apisports-key':AK}});
    if(!r.ok)throw new Error(`HTTP ${r.status}`);
    const d=await r.json();
    if(d.errors&&Object.keys(d.errors).length)throw new Error(Object.values(d.errors).join(', '));
    allFix=(d.response||[]).filter(f=>WI.has(f.league.id));
    renderFix(sel);
  }catch(err){
    ct.innerHTML=`<div class="err"><h3>&#9888; ${esc(err.message)}</h3><p>Download & open in browser.</p></div>`;
  }finally{btn.classList.remove('ld');btn.innerHTML='&#9906; SCAN';bq()}
}

// ── RENDER ──
function renderFix(sel){
  const ct=document.getElementById('ct'),grouped={};
  allFix.forEach(f=>{const lid=f.league.id;if(!grouped[lid])grouped[lid]={league:f.league,fixes:[]};grouped[lid].fixes.push(f)});
  Object.values(grouped).forEach(g=>g.fixes.sort((a,b)=>new Date(a.fixture.date)-new Date(b.fixture.date)));
  const sortedKeys=Object.keys(grouped).sort((a,b)=>(WL[a]?.t??99)-(WL[b]?.t??99));
  const total=allFix.length,lc=sortedKeys.length;
  const live=allFix.filter(f=>isLive(f.fixture.status.short)).length,sched=allFix.filter(f=>f.fixture.status.short==='NS').length,fin=allFix.filter(f=>isFin(f.fixture.status.short)).length;
  const sb=document.getElementById('sts');sb.classList.remove('hidden');
  sb.innerHTML=`<div class="st"><div class="stv" style="color:var(--grn)">${total}</div><div class="stl">Fixtures</div></div><div class="st"><div class="stv" style="color:var(--org)">${lc}</div><div class="stl">Leagues</div></div><div class="st"><div class="stv" style="color:var(--red)">${live}</div><div class="stl">Live</div></div><div class="st"><div class="stv" style="color:var(--cyn)">${sched}</div><div class="stl">Upcoming</div></div><div class="st"><div class="stv" style="color:var(--t3)">${fin}</div><div class="stl">Finished</div></div>`;
  const fb=document.getElementById('flt');
  if(total){fb.classList.remove('hidden');let fh=`<button class="fb on" onclick="doF('all',this)">All <span class="n">${total}</span></button>`;sortedKeys.forEach(lid=>{const g=grouped[lid];fh+=`<button class="fb" onclick="doF('${lid}',this)">${g.league.flag?`<img src="${g.league.flag}">`:''}${esc(g.league.name)} <span class="n">${g.fixes.length}</span></button>`});fb.innerHTML=fh}else fb.classList.add('hidden');
  if(!total){ct.innerHTML=`<div class="empty"><div class="empi">&#9917;</div><div class="empt">No fixtures for ${fmtD(sel)}</div></div>`;return}
  let html='';
  sortedKeys.forEach(lid=>{const g=grouped[lid],lg=g.league;html+=`<div class="lsec" data-lid="${lid}"><div class="lh">${lg.logo?`<img src="${lg.logo}">`:''}${lg.flag?`<img class="lhf" src="${lg.flag}">`:''}<div><div class="ln">${esc(lg.name)}</div><div class="lc">${esc(lg.country||'')}</div></div><span class="lct">${g.fixes.length}</span><div class="ll"></div></div>`;g.fixes.forEach(f=>{html+=renderMatch(f)});html+=`</div>`});
  ct.innerHTML=html;
}

function renderMatch(f){
  const h=f.teams.home,a=f.teams.away,st=f.fixture.status,g=f.goals;
  const leagueName = f.league.name || '';
  // Strip accents from API team names for display consistency
  const hName = fixName(stripAccents(h.name));
  const aName = fixName(stripAccents(a.name));
  let center='';
  if(st.short==='NS'||st.short==='TBD')center=`<div class="mct sns">${fmtT(f.fixture.date)}</div><div class="mcst sns">${st.short==='TBD'?'TBD':'Kickoff'}</div>`;
  else if(isLive(st.short))center=`<div class="mcs slvs">${g.home??0} – ${g.away??0}</div><div class="mcst slv">${st.elapsed||''}' ${st.short}</div>`;
  else if(isFin(st.short))center=`<div class="mcs">${g.home??0} – ${g.away??0}</div><div class="mcst sft">${stLbl(st.short)} · ${fmtT(f.fixture.date)}</div>`;
  else center=`<div class="mct sps">${stLbl(st.short)}</div><div class="mcst sps">${fmtT(f.fixture.date)}</div>`;

  // Lookup BTTS — pass league name for league-aware matching
  const hB=lookupBTTS(h.name, leagueName, 'home');
  const aB=lookupBTTS(a.name, leagueName, 'away');
  const combined=(hB&&aB)?Math.round((hB.btts+aB.btts)/2):null;

  // Home BTTS chip
  let hBttsHtml=hB?`<div class="tm-btts">🏠 BTTS ${hB.btts}% <span class="tm-btts-gm">(${hB.mp}gm)</span></div>`:'';
  // Away BTTS chip
  let aBttsHtml=aB?`<div class="tm-btts">✈️ BTTS ${aB.btts}% <span class="tm-btts-gm">(${aB.mp}gm)</span></div>`:'';

  // Combined BTTS bar
  let combHtml='';
  if(combined!==null){
    let cls='btts-m',lbl=`BTTS ${combined}%`;
    if(combined>=55){cls='btts-y';lbl=`BTTS YES ${combined}%`}
    else if(combined<=40){cls='btts-n';lbl=`BTTS NO ${100-combined}%`}
    let resultChip='';
    if(isFin(st.short)&&g.home!==null&&g.away!==null){
      const bttsHit=g.home>0&&g.away>0;
      resultChip=bttsHit?`<span class="chip btts-hit">✓ HIT</span>`:`<span class="chip btts-miss">✗ MISS</span>`;
    }
    combHtml=`<div class="pred"><span class="chip ${cls} btts-hi">${lbl}</span>${resultChip}</div>`;
  }else{
    combHtml=`<div class="pred"><span class="pna">Teams not found in BTTS DB</span></div>`;
  }

  return`<div class="mx"><div class="mx-top">
    <div class="tm">${h.logo?`<img src="${h.logo}">`:''}
      <div class="tm-info"><div class="tn">${hName}</div>${hBttsHtml}</div></div>
    <div class="mc">${center}</div>
    <div class="tm aw">${a.logo?`<img src="${a.logo}">`:''}
      <div class="tm-info"><div class="tn">${aName}</div>${aBttsHtml}</div></div>
  </div>${combHtml}</div>`;
}

// Fix team names with special chars that API-Football may mangle
function fixName(n){
  const fixes={'Eyupspor':'Eyüpspor','Genclerbirligi':'Gençlerbirliği','Karagumruk':'Karagümrük',
    'Basaksehir':'Başakşehir','Trabzonspor':'Trabzonspor','Gaziantep':'Gaziantep',
    'Umraniyespor':'Ümraniyespor','Kayserispor':'Kayserispor','Istanbulspor':'İstanbulspor',
    'Kasimpasa':'Kasımpaşa','Caykur Rizespor':'Çaykur Rizespor','Rizespor':'Çaykur Rizespor',
    'Fenerbahce':'Fenerbahçe','Besiktas':'Beşiktaş','Galatasaray':'Galatasaray',
    'Konyaspor':'Konyaspor','Sivasspor':'Sivasspor','Alanyaspor':'Alanyaspor',
    'Ankaragucu':'Ankaragücü','MKE Ankaragucu':'MKE Ankaragücü',
    'Giresunspor':'Giresunspor','Adana Demirspor':'Adana Demirspor',
    'Hatayspor':'Hatayspor','Pendikspor':'Pendikspor',
    'Borussia Monchengladbach':"Borussia M'gladbach",
    'Brondby':'Brøndby','Midtjylland':'FC Midtjylland',
    'Nordsjaelland':'Nordsjælland','Silkeborg':'Silkeborg IF',
    'Bodo/Glimt':'Bodø/Glimt','Valerenga':'Vålerenga',
    'Lillestrom':'Lillestrøm','Stromsgodset':'Strømsgodset',
    'Tromso':'Tromsø','Haugesund':'FK Haugesund',
    'Zurich':'FC Zürich','Luzern':'FC Luzern'};
  for(const[k,v]of Object.entries(fixes)){
    if(n.toLowerCase().includes(k.toLowerCase()))return v;
  }
  return n;
}

function isLive(s){return['1H','2H','HT','ET','BT','P','LIVE'].includes(s)}
function isFin(s){return['FT','AET','PEN'].includes(s)}
function stLbl(s){return{FT:'Full Time',AET:'Extra Time',PEN:'Penalties',PST:'Postponed',CANC:'Cancelled',ABD:'Abandoned',SUSP:'Suspended',HT:'Half Time','1H':'1st Half','2H':'2nd Half',NS:'Not Started'}[s]||s}
function doF(lid,el){document.querySelectorAll('.fb').forEach(b=>b.classList.remove('on'));if(el)el.classList.add('on');document.querySelectorAll('.lsec').forEach(s=>{s.classList.toggle('hidden',lid!=='all'&&s.dataset.lid!==lid)})}
document.getElementById('dp').addEventListener('change',()=>doScan());
// iOS-friendly: add touchend listener to scan button as backup
document.getElementById('btn').addEventListener('touchend',(e)=>{e.preventDefault();doScan()});
init();
</script>
